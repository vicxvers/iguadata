<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iguadata</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600;700&family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --accent: #f59e0b;
            --font-display: 'Instrument Serif', serif;
            --font-body: 'Instrument Sans', sans-serif;
            --font-mono: 'Zalando Sans Expanded', sans-serif;
        }

        html,
        body {
            height: 100%;
            background: #0d1f3c;
            color: white;
            font-family: var(--font-body);
        }

        .home-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
        }

        .header {
            background: #0d1f3c;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 1.25rem 0;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-logo-main {
            font-family: var(--font-display);
            font-size: 1.75rem;
            color: #ffffff;
            font-weight: 600;
        }

        .header-logo-main em {
            font-style: italic;
        }

        .header-tag {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #ffffff;
        }

        .hero {
            flex: 1;
            background: #0d1f3c;
            padding: 2.5rem 2rem 3rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 600px;
            background: radial-gradient(ellipse at center, rgba(37, 99, 235, 0.28) 0%, rgba(30, 58, 138, 0.14) 40%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -5%;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 300px;
            background: radial-gradient(ellipse at center, rgba(59, 130, 246, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .hero>* {
            position: relative;
            z-index: 1;
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(3rem, 7vw, 6.5rem);
            line-height: 1.05;
            color: #ffffff;
            max-width: 950px;
            margin: 0 auto 1.75rem;
            font-weight: 400;
            letter-spacing: -0.03em;
            opacity: 0;
            animation: fadeUp 0.7s ease 0.1s forwards;
        }

        .hero-title em {
            font-style: italic;
            color: #ffffff;
        }

        .hero-subtitle {
            font-size: 1.0625rem;
            color: rgba(203, 213, 225, 0.72);
            max-width: 600px;
            margin: 0 auto 4.5rem;
            line-height: 1.7;
            opacity: 0;
            animation: fadeUp 0.7s ease 0.25s forwards;
        }

        .hero-modules {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            opacity: 0;
            animation: fadeUp 0.7s ease 0.4s forwards;
        }

        .hero-module {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 18px;
            padding: 2.25rem 2rem;
            text-align: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .hero-module::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(147, 197, 253, 0.35), transparent);
        }

        .hero-module:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(147, 197, 253, 0.22);
            transform: translateY(-3px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
        }

        .hero-module-value {
            font-family: var(--font-display);
            font-size: 3.25rem;
            font-weight: 400;
            letter-spacing: -0.03em;
            color: #ffffff;
            display: block;
            margin-bottom: 0.5rem;
            line-height: 1;
        }

        .hero-module-label {
            font-family: var(--font-mono);
            font-size: 0.6875rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(148, 163, 184, 0.7);
            font-weight: 500;
        }

        .coming-soon {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            margin-top: 3rem;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(148, 163, 184, 0.6);
            opacity: 0;
            animation: fadeUp 0.7s ease 0.55s forwards;
        }

        .coming-soon-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }

        .coming-soon a {
            color: rgba(148, 163, 184, 0.6);
            text-decoration: none;
            transition: color 0.2s;
            margin-left: 1.25rem;
        }

        .coming-soon a:hover {
            color: white;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        @media (max-width: 640px) {
            .hero-title {
                font-size: clamp(3rem, 13vw, 4rem);
            }

            .hero-subtitle {
                margin-bottom: 2.5rem;
            }

            .hero-modules {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.625rem;
                max-width: 100%;
            }

            .hero-module {
                padding: 1.25rem 0.5rem;
                border-radius: 14px;
            }

            .hero-module-value {
                font-size: 1.6rem;
                margin-bottom: 0.3rem;
            }

            .hero-module-label {
                font-size: 0.55rem;
                letter-spacing: 0.08em;
            }
        }
    </style>
</head>

<body>
    <div class="home-wrapper">
        <header class="header">
            <div class="header-content">
                <div class="header-logo-main">Igua<em>data</em></div>
                <span class="header-tag">Monitor de Transparència</span>
            </div>
        </header>
        <section class="hero">
            <h1 class="hero-title">
                Transparència en la<br>contractació pública <em>d'Igualada</em>
            </h1>
            <p class="hero-subtitle">
                Plataforma de dades obertes per a la visualització, anàlisi i fiscalització dels contractes públics de
                l'Ajuntament d'Igualada
            </p>
            <div class="hero-modules">
                <div class="hero-module">
                    <span class="hero-module-value">6.670</span>
                    <span class="hero-module-label">Contractes</span>
                </div>
                <div class="hero-module">
                    <span class="hero-module-value">88,1M €</span>
                    <span class="hero-module-label">Import Total</span>
                </div>
                <div class="hero-module">
                    <span class="hero-module-value">1.472</span>
                    <span class="hero-module-label">Empreses</span>
                </div>
            </div>
            <div class="coming-soon">
                <div class="coming-soon-dot"></div>
                Pròximament
            </div>
        </section>
    </div>
</body>

</html>
